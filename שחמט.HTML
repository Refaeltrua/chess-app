<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>שחמט מרחוק</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}
header {
    background: #333;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}
iframe {
    width: 100%;
    height: 60vh;
    border: none;
}
#chat-box {
    height: 25vh;
    overflow-y: auto;
    background: white;
    padding: 10px;
    border-top: 2px solid #ccc;
}
#input-area {
    display: flex;
    padding: 10px;
    background: #eee;
}
#msg {
    flex: 1;
    padding: 10px;
    font-size: 16px;
}
button {
    padding: 10px 15px;
    font-size: 16px;
    margin-left: 10px;
}
</style>

</head>
<body>

<header>שחמט מרחוק</header>

<!-- לוח שחמט מוטמע -->
<iframe src="https://lichess.org/?friend" allowfullscreen></iframe>

<!-- צ'אט -->
<div id="chat-box"></div>

<div id="input-area">
    <input id="msg" type="text" placeholder="כתוב הודעה...">
    <button onclick="sendMsg()">שלח</button>
</div>

<script>
// צ'אט פשוט מקומי (לא אונליין)
const chatBox = document.getElementById("chat-box");

function sendMsg() {
    const msg = document.getElementById("msg").value;
    if (!msg.trim()) return;

    const div = document.createElement("div");
    div.textContent = "אתה: " + msg;
    chatBox.appendChild(div);

    document.getElementById("msg").value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
